# CodeSeek Golden Evaluation Queries
# This dataset is used to benchmark retrieval layers, fusion (RRF), and intent-aware reranking.

- id: q001
  query: "Where is repo session creation handled?"
  category: "code_location"
  expected_intent: "code_location"
  expected_reranker_intent: "FILE"
  expected_files:
    - "backend/retrieval/session_indexer.py"
  expected_symbols:
    - "_populate_repo_status"
  must_hit_top_k: 50
  notes: >
    Updated from stale create_session expectation. Current session creation/status
    handling is retrieved through session_indexer.py helper functions.

- id: q002
  query: "How does the retrieval pipeline work?"
  category: "architecture"
  expected_intent: "technical_explanation"
  expected_reranker_intent: "ARCHITECTURE"
  expected_files:
    - "backend/docs/retrieval_docs/current_retrieval_strategy.md"
    - "backend/retrieval/query/query_processor.py"
    - "backend/retrieval/search/searcher.py"
    - "backend/retrieval/generation/code_answers.py"
  must_hit_top_k: 10
  notes: >
    Conceptual architecture query. Retrieval docs are valid expected context.

