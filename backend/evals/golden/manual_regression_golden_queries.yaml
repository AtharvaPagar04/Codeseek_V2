- id: manual_safe_eval_source_location
  query: "Where is safe eval implemented?"
  category: "source_location"
  expected_intent: "code_location"
  expected_reranker_intent: "FILE"
  expected_response_mode: "source_location"
  expected_files:
    - "backend/evals/run_safe_evals.py"
  expected_symbols:
    - "main"
  must_hit_top_k: 5
  notes: >
    Regression for implementation-vs-docs source-location ranking. The real
    runner file should stay primary when it exists.
