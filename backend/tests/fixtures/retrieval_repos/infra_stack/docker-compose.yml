services:
  api:
    image: fixture/api:latest
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fixture:fixture@postgres:5432/fixture
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
volumes:
  pgdata:
