services:
  web:
    image: fixture/web:latest
    depends_on:
      - api
    ports:
      - "5173:5173"
  api:
    image: fixture/api:latest
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
