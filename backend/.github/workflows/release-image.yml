name: Release Image

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.2.3). Leave empty for staging publish."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: atharvapagar04/codeseek

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        shell: bash
        run: |
          SHA_TAG="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:${VERSION},${REGISTRY}/${IMAGE_NAME}:latest,${SHA_TAG}" >> "$GITHUB_OUTPUT"
            echo "channel=production" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:${VERSION},${REGISTRY}/${IMAGE_NAME}:latest,${SHA_TAG}" >> "$GITHUB_OUTPUT"
            echo "channel=production" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REGISTRY}/${IMAGE_NAME}:staging,${SHA_TAG}" >> "$GITHUB_OUTPUT"
            echo "channel=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=codeseek
            org.opencontainers.image.description=Repository-grounded RAG retrieval API
            org.opencontainers.image.source=https://github.com/AtharvaPagar04/Codeseek
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          echo "Channel: ${{ steps.tags.outputs.channel }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Published tags: ${{ steps.tags.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
