services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeseek
      POSTGRES_USER: codeseek
      POSTGRES_PASSWORD: codeseek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeseek -d codeseek"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:6333/healthz', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  codeseek-api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CODESEEK_DB_BACKEND=${CODESEEK_DB_BACKEND:-postgres}
      - CODESEEK_DATABASE_URL=${CODESEEK_DATABASE_URL:-postgresql://codeseek:codeseek@postgres:5432/codeseek}
      # Persistent workspace: cloned repos survive backend container restarts.
      - CODESEEK_REPO_WORKSPACE=/data/repo_workspace
    volumes:
      - repo_workspace:/data/repo_workspace
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_storage:
  # Named volume for cloned repo workspaces.  Without this, every backend
  # restart triggers a full re-clone and re-index for all sessions.
  repo_workspace:
