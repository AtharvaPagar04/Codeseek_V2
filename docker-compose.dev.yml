services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:6333/healthz', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeseek
      POSTGRES_USER: codeseek
      POSTGRES_PASSWORD: codeseek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeseek -d codeseek"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    working_dir: /app
    command:
      - uvicorn
      - retrieval.api_service:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      CODESEEK_DB_BACKEND: postgres
      CODESEEK_DATABASE_URL: ${CODESEEK_DATABASE_URL:-postgresql://codeseek:codeseek@postgres:5432/codeseek}
      CODESEEK_REPO_WORKSPACE: /data/repo_workspace
      INGESTION_TEMP_CLONE_DIR: /tmp/rag_ingestion
      RETRIEVAL_REPO_ROOT: /app
      CODESEEK_TENANT_ID: ${CODESEEK_TENANT_ID:-local}
      CODESEEK_API_KEY: ${CODESEEK_API_KEY:-local-dev-key}
      CODESEEK_APP_ENCRYPTION_KEY: ${CODESEEK_APP_ENCRYPTION_KEY:-local-dev-encryption-key-change-me-32}
      CODESEEK_FRONTEND_URL: ${CODESEEK_FRONTEND_URL:-http://localhost:5173}
      CODESEEK_CORS_ORIGINS: ${CODESEEK_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - repo_workspace:/data/repo_workspace
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_API_KEY: ${VITE_API_KEY:-${CODESEEK_API_KEY:-local-dev-key}}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_storage:
  repo_workspace:
  frontend_node_modules:
